<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Duplicate Detector</title>
    <style>
        :root {
            /* Simple, clean light theme variables */
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --accent-color: #2c3e50; /* Professional slate blue */
            --text-main: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); /* Soft, subtle shadow */
            width: 100%;
            max-width: 800px;
            border: 1px solid #e0e0e0;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--accent-color);
        }

        .instructions {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(44, 62, 80, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
        }

        #results-container {
            margin-top: 30px;
        }

        .result-card {
            background-color: #f9f9f9;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            border-top: 1px solid #eee;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .match-score {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .sentence {
            margin: 5px 0;
            padding: 8px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }

        .error {
            color: #d9534f;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Duplicate Sentence Detector</h1>
        <p class="instructions">Enter your sentences below. <strong>Press 'Enter' to place each sentence on a new line.</strong> The system will process your text and find contextual duplicates.</p>
        
        <textarea id="textInput" placeholder="Enter sentence 1 here...&#10;Enter sentence 2 here...&#10;Enter sentence 3 here..."></textarea>
        
        <button onclick="analyzeText()">Analyze Sentences</button>

        <div id="results-container"></div>
    </div>

    <script>
        async function analyzeText() {
            const textInput = document.getElementById('textInput').value;
            const resultsContainer = document.getElementById('results-container');
            
            // Clear previous results
            resultsContainer.innerHTML = '<p style="text-align:center;">Analyzing...</p>';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: textInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    resultsContainer.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                if (data.results.length === 0) {
                    resultsContainer.innerHTML = '<p style="text-align:center; color:#666;">No near-duplicates found.</p>';
                    return;
                }

                // Build the HTML for the results
                let htmlContent = `<h3>Found ${data.results.length} Potential Duplicates:</h3>`;
                
                data.results.forEach(item => {
                    htmlContent += `
                        <div class="result-card">
                            <div class="match-score">${item.match_percentage}% Similarity Match</div>
                            <div class="sentence"><strong>A:</strong> ${item.sentence1}</div>
                            <div class="sentence"><strong>B:</strong> ${item.sentence2}</div>
                        </div>
                    `;
                });

                resultsContainer.innerHTML = htmlContent;

            } catch (error) {
                resultsContainer.innerHTML = `<div class="error">An error occurred connecting to the server.</div>`;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
